<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情侣默契小游戏</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    <header class="site-header">
      <h1><a href="{{ url_for('index') }}">💕 情侣默契小游戏</a></h1>
      <nav>
        <a href="{{ url_for('create_room') }}">创建房间</a>
        <a href="{{ url_for('join_room') }}">加入房间</a>
        <a href="{{ url_for('history') }}">历史记录</a>
      </nav>
    </header>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-box">
          {% for msg in messages %}
            <div class="flash">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
